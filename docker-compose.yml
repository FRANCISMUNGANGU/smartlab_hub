services:
  
  api:
    build: .
    container_name: smartlab_api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smartlab_network
  db:
    image: postgres:15-alpine
    container_name: smartlab_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    
    ports:
      - "5432:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - smartlab_network
  

  nginx:
    build: ./nginx
    container_name: smartlab_nginx
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - smartlab_network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: smartlap_ngrok
    restart: unless-stopped
    command: http nginx:80
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      - "4040:4040"
    depends_on:
      - nginx
    networks:
      - smartlab_network

networks:
  smartlab_network:
    driver: bridge


volumes:
  postgres_data:

